table:
  name: shared_playlist_recipients
  schema: public
configuration:
  column_config:
    playlist_id:
      custom_name: playlistId
    recipient_id:
      custom_name: recipientId
  custom_column_names:
    playlist_id: playlistId
    recipient_id: recipientId
  custom_root_fields: {}
object_relationships:
  - name: playlist
    using:
      foreign_key_constraint_on: playlist_id
  - name: user
    using:
      foreign_key_constraint_on: recipient_id
