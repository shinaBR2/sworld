table:
  name: video_views
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
  - name: video
    using:
      foreign_key_constraint_on: video_id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - id
        - video_id
        - viewed_at
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - video_id
        - viewed_at
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      allow_aggregations: true
    comment: ""
