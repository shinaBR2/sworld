name: Main E2E on PR

# Runs the main-app journal smoke test against a locally-built, locally-served
# bundle (fake Auth0 session + mocked Hasura — see apps/main/e2e/support). It
# depends on no deployed environment on purpose, so it runs on every PR that
# touches the main app or its shared packages.
#
# The path filter lives in the `changes` job below, NOT in `on:`. An `on: paths`
# filter stops the workflow from triggering at all, so no check run is ever
# created and a required check sits pending forever, blocking the merge. Filtering
# in a job instead means the workflow always triggers: `changes` always reports,
# and `e2e` is skipped when nothing relevant changed — and GitHub counts a skipped
# job as a passing required check. This is the pattern the incoming backend/ and
# hasura/ gates reuse (SWO-540).
#
# Porting a filter here is NOT a copy-paste of an `on: paths` list — the two use
# different glob dialects. `on: paths` reads `**.ts` as "any .ts at any depth";
# paths-filter uses picomatch, where `**` is only a globstar as a whole segment,
# so `**.ts` silently degrades to root-level files only. Write `'**/*.ts'`.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Cheap always-run gate: no checkout, reads the PR's changed files from the API.
  changes:
    # Explicit check name — see the note in hasura-pr.yml. Two workflows with a
    # job called `changes` would report two identically-named check runs, which
    # branch protection cannot distinguish.
    name: main e2e path filter
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      main: ${{ steps.filter.outputs.main }}
    steps:
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          # Anything the main-app e2e build resolves against, not just its own
          # source: a lockfile or root-config change can break the build on its
          # own, and skipping here reports an affirmative green.
          filters: |
            main:
              - 'apps/main/**'
              - 'packages/core/**'
              - 'packages/ui/**'
              - 'packages/tsconfig/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.npmrc'
              - '.github/workflows/e2e-main-pr.yml'

  e2e:
    needs: changes
    # Skip only on an explicit 'false' — i.e. the filter ran and said no. An `==
    # 'true'` test would also skip when `changes` itself errored, and a skipped
    # job scores as a pass, so an API blip would silently green the gate. Failing
    # towards running the suite is the safe direction.
    if: ${{ !cancelled() && needs.changes.outputs.main != 'false' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'

      - name: Install pnpm
        uses: pnpm/action-setup@v4.0.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      # main's build:e2e resolves `core`/`ui` from their dist, so build those first.
      - name: Build shared packages
        run: pnpm turbo run build --filter=core --filter=ui

      - name: Install Playwright browser
        run: pnpm --filter main exec playwright install --with-deps chromium

      # The e2e script's webServer runs build:e2e (fixed test env) + preview.
      - name: Run Playwright tests
        run: pnpm --filter main run e2e

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/main/playwright-report/
          retention-days: 30
