name: Typecheck on PR

# No path filter on purpose. A workflow that never triggers never reports a
# check run, so a required check would sit pending forever and block the merge.
# Typecheck is cheap and the repo is public (free runners), so it always runs
# and always reports. Gates expensive enough to be worth skipping use the
# filter-job pattern instead — see e2e-main-pr.yml.
on:
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'

      - name: Install pnpm
        uses: pnpm/action-setup@v4.0.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      # Typechecks source across the frontend packages (tests/stories/spec files
      # are excluded via each package's tsconfig.typecheck.json until SWO-351).
      - name: Typecheck
        run: pnpm run typecheck
