name: Typecheck on PR

# Skips only a PR whose every changed file lives in apps/hasura — the one part
# of the workspace `pnpm typecheck` genuinely cannot reach (SWO-549).
#
# The filter lives in the `changes` job, NOT in `on:`. An `on: paths` filter
# stops the workflow triggering at all, so no check run is created and a
# required check sits pending forever, blocking the merge. Filtering in a job
# means the workflow always triggers: `changes` always reports, `typecheck` is
# skipped when nothing relevant changed, and GitHub counts a skipped job as a
# passing required check. Full note, including the picomatch glob-dialect trap
# when porting a filter, in e2e-main-pr.yml.
#
# Why the filter excludes hasura but NOT backend, despite SWO-549's title:
# `pnpm typecheck` is `turbo run typecheck --filter=!docs`, so it runs every
# workspace package exposing a `typecheck` script. Post-consolidation
# apps/backend is such a package (`tsc --noEmit`) and consumes `core` as a
# workspace dependency, so a backend-only change really can break this gate —
# and this is the *only* CI gate the backend has, since biome.json excludes it
# from `pnpm lint` and no workflow lints it. Skipping backend here would leave
# backend PRs with no CI at all. apps/hasura is the opposite case: the package
# (`sworld-hasura-v2`) exposes only `lint` / `test:local` / `test:ci` and no
# `typecheck`, so turbo never visits it and this gate can only ever report an
# uninformative green for a hasura-only PR. That asymmetry is the whole filter.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Cheap always-run gate: no checkout, reads the PR's changed files from the API.
  changes:
    # Explicit check name — see the note in hasura-pr.yml. Every path-filtered
    # workflow has a job called `changes`, and a check run is named after the
    # job, so without this two workflows report indistinguishable rows and
    # branch protection cannot tell them apart.
    name: typecheck path filter
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      typecheck: ${{ steps.filter.outputs.typecheck }}
    steps:
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          # A negated pattern, on purpose: it matches any changed file outside
          # apps/hasura, so the output is false only when *every* changed file
          # is inside it. Written this way rather than as a positive allow-list
          # because an allow-list has to be extended for every new app and every
          # new root config file, and forgetting silently reports green. This
          # fails in the safe direction — anything new, anywhere, runs the gate.
          #
          # The second pattern re-arms the gate for the one hasura-internal file
          # that can invalidate the assumption above. Skipping is only sound
          # while apps/hasura exposes no `typecheck` script for turbo to find;
          # the PR that adds one would otherwise be exactly the PR that skips,
          # and the post-merge run ignores apps/hasura too, so nothing would
          # catch it until an unrelated PR went red. Its manifest is also where
          # a dependency edit would desync the root lockfile.
          filters: |
            typecheck:
              - '!apps/hasura/**'
              - 'apps/hasura/package.json'

  typecheck:
    needs: changes
    # Skip only on an explicit 'false' — i.e. the filter ran and said no. An `==
    # 'true'` test would also skip when `changes` itself errored, and a skipped
    # job scores as a pass, so an API blip would silently green the gate.
    if: ${{ !cancelled() && needs.changes.outputs.typecheck != 'false' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'

      - name: Install pnpm
        uses: pnpm/action-setup@v4.0.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      # Typechecks source across the frontend packages and apps/backend
      # (tests/stories/spec files are excluded via each package's
      # tsconfig.typecheck.json until SWO-351).
      - name: Typecheck
        run: pnpm run typecheck
