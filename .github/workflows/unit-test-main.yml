name: Unit Test Main

# Post-merge run of `turbo run test`. Unlike the PR gates, this filters in `on:`
# rather than in a `changes` job: a push workflow reports no check run to a
# pull request, so the "required check sits pending forever" trap that forces
# the filter-job pattern in typecheck-pr.yml / unit-test-pr.yml simply does not
# apply here. Not triggering at all is the desired outcome.
#
# apps/hasura is ignored because turbo never visits it — the package
# (`sworld-hasura-v2`) names its suite `test:local` / `test:ci` on purpose, so
# it has no `test` script for `turbo run test` to pick up (SWO-549).
# apps/backend is deliberately NOT ignored: it does expose `test`, so this run
# genuinely covers it.
on:
  push:
    branches: [main]
    paths-ignore:
      - 'apps/docs/**'
      - 'apps/hasura/**'
      - '**/*.md'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'

      - name: Install pnpm
        uses: pnpm/action-setup@v4.0.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm turbo run test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
