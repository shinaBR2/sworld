# Post-merge verification for the watch app.
#
# This workflow does NOT deploy. Cloudflare Pages builds and deploys watch from
# its own pipeline on merge to main (see the `architecture` skill for the deploy
# model). All this job does is record the released commit in Rollbar and audit
# the live site against its Lighthouse budget.

name: Live Watch
'on':
  push:
    branches:
      - main
    paths:
      - 'apps/watch/**'
      - 'packages/core/**'
      - 'packages/ui/**'
      - '.github/workflows/live-watch-fe.yml'

jobs:
  verify_prod:
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      # Tells Rollbar which commit is now live, so errors are attributed to the
      # right release. Merge is deploy, so the merged SHA is the released one.
      - name: Notify deploy to Rollbar
        uses: rollbar/github-deploy-action@2.1.2
        with:
          environment: 'production'
          version: ${{ github.sha }}
          status: 'succeeded'
        env:
          ROLLBAR_ACCESS_TOKEN: ${{ secrets.ROLLBAR_SERVER_TOKEN }}
          ROLLBAR_USERNAME: ${{ github.actor }}
      - name: Audit URLs using Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ vars.VITE_WATCH_SITE_URL }}
          runs: 3
          budgetPath: apps/watch/budget.json # test performance budgets
          uploadArtifacts: true # save results as an action artifacts
          temporaryPublicStorage: true # upload lighthouse report to the temporary storage
