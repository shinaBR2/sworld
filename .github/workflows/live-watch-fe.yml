# Post-merge verification for the watch app.
#
# This workflow does NOT deploy. Cloudflare Pages builds and deploys watch from
# its own pipeline on merge to main (see the `architecture` skill for the deploy
# model). All this job does is audit the live site against its Lighthouse budget.
#
# Rollbar deploy tracking is configured on the Cloudflare side, not here — only
# Cloudflare knows when a build actually shipped.
#
# Note: nothing here knows when Cloudflare has finished publishing this commit,
# so the audit may measure the previous release. Fixing that properly needs the
# site to expose its built SHA — see SWO-558.

name: Live Watch
'on':
  push:
    branches:
      - main
    paths:
      - 'apps/watch/**'
      - 'packages/core/**'
      - 'packages/ui/**'
      - '.github/workflows/live-watch-fe.yml'

jobs:
  verify_prod:
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Audit URLs using Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ vars.VITE_WATCH_SITE_URL }}
          runs: 3
          budgetPath: apps/watch/budget.json # test performance budgets
          uploadArtifacts: true # save results as an action artifacts
          temporaryPublicStorage: true # upload lighthouse report to the temporary storage
