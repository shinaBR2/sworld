name: Unit Test on PR

# Skips only a PR whose every changed file lives in apps/hasura — the one part
# of the workspace `pnpm test` genuinely cannot reach (SWO-549). See the long
# note in typecheck-pr.yml: the filter belongs in the `changes` job rather than
# `on:`, and backend is deliberately NOT excluded.
#
# The same asymmetry applies here. `pnpm test` is `turbo run test`, and
# apps/backend exposes a `test` script (vitest), so this gate really does cover
# the backend. apps/hasura names its suite `test:local` / `test:ci` precisely so
# turbo does not pick it up — it needs a live Hasura endpoint and Auth0
# credentials — so a hasura-only PR can only ever get an uninformative green
# here.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Cheap always-run gate: no checkout, reads the PR's changed files from the API.
  changes:
    # Explicit check name — see the note in hasura-pr.yml. A check run is named
    # after its job, so several workflows with a job called `changes` would
    # report indistinguishable rows.
    name: unit test path filter
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      test: ${{ steps.filter.outputs.test }}
    steps:
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          # One negated pattern: matches any changed file outside apps/hasura,
          # so the output is false only when *every* changed file is inside it.
          # Deliberately not a positive allow-list — see typecheck-pr.yml.
          filters: |
            test:
              - '!apps/hasura/**'

  test:
    needs: changes
    # Skip only on an explicit 'false' — i.e. the filter ran and said no. An `==
    # 'true'` test would also skip when `changes` itself errored, and a skipped
    # job scores as a pass, so an API blip would silently green the gate.
    if: ${{ !cancelled() && needs.changes.outputs.test != 'false' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.18.0'

      - name: Install pnpm
        uses: pnpm/action-setup@v4.0.0

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm run test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
