# Post-merge verification for the listen app.
#
# This workflow does NOT deploy. Cloudflare Pages builds and deploys listen from
# its own pipeline on merge to main (see the `architecture` skill for the deploy
# model). All this job does is check the live site afterwards: end-to-end tests
# plus a Lighthouse budget audit, both against the real prod URL.

name: Live Listen
'on':
  push:
    branches:
      - main
    paths:
      - 'apps/listen/**'
      - 'packages/core/**'
      - 'packages/ui/**'
      - '.github/workflows/live-listen-fe.yml'
jobs:
  verify_prod:
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Setup pnpm
        uses: pnpm/action-setup@v4.0.0
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install
      # Note: nothing here knows when Cloudflare has finished publishing this
      # commit, so these steps may measure the previous release. Fixing that
      # properly needs the site to expose its built SHA — see SWO-558.
      # Playwright drives the deployed site directly — playwright.config.ts uses
      # VITE_LISTEN_SITE_URL as its baseURL — so there is nothing to build here.
      - name: Run Playwright Tests
        working-directory: apps/listen
        run: |
          pnpm exec playwright install --with-deps
          pnpm run e2e
        env:
          VITE_LISTEN_SITE_URL: ${{ vars.VITE_LISTEN_SITE_URL }}
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
      - name: Audit URLs using Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            ${{ vars.VITE_LISTEN_SITE_URL }}
          runs: 3
          budgetPath: apps/listen/budget.json # test performance budgets
          uploadArtifacts: true # save results as an action artifacts
          temporaryPublicStorage: true # upload lighthouse report to the temporary storage
