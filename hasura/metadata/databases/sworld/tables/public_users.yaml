table:
  name: users
  schema: public
array_relationships:
  - name: audios
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: audios
          schema: public
  - name: crawl_requests
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: crawl_requests
          schema: public
  - name: finance_transactions
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: finance_transactions
          schema: public
  - name: journals
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: journals
          schema: public
  - name: notifications
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: notifications
          schema: public
  - name: playlists
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: playlist
          schema: public
  - name: shared_video_recipients
    using:
      foreign_key_constraint_on:
        column: receiver_id
        table:
          name: shared_video_recipients
          schema: public
  - name: user_video_histories
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: user_video_history
          schema: public
  - name: video_views
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: video_views
          schema: public
  - name: videos
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: videos
          schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - username
      filter:
        _or:
          - id:
              _eq: X-Hasura-User-Id
          - playlists:
              shared_video_recipients:
                receiver_id:
                  _eq: X-Hasura-User-Id
    comment: ""
