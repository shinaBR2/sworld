table:
  name: users
  schema: public
array_relationships:
  - name: audios
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: audios
          schema: public
  - name: crawl_requests
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: crawl_requests
          schema: public
  - name: finance_transactions
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: finance_transactions
          schema: public
  - name: journals
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: journals
          schema: public
  - name: notifications
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: notifications
          schema: public
  - name: playlists
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: playlist
          schema: public
  - name: shared_video_recipients
    using:
      foreign_key_constraint_on:
        column: receiver_id
        table:
          name: shared_video_recipients
          schema: public
  - name: shared_videos
    using:
      foreign_key_constraint_on:
        column: owner_id
        table:
          name: shared_videos
          schema: public
  - name: user_video_histories
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: user_video_history
          schema: public
  - name: video_views
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: video_views
          schema: public
  - name: videos
    using:
      foreign_key_constraint_on:
        column: user_id
        table:
          name: videos
          schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - created_at
        - email
        - id
        - updated_at
        - username
      filter:
        _or:
          - id:
              _eq: X-Hasura-User-Id
          - shared_videos:
              _and:
                - active:
                    _eq: true
                - shared_video_recipients:
                    receiver_id:
                      _eq: X-Hasura-User-Id
    comment: Only select their own user profile based on `auth0_id`
