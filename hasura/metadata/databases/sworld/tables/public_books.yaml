table:
  name: books
  schema: public
configuration:
  column_config:
    created_at:
      custom_name: createdAt
    file_url:
      custom_name: fileUrl
    thumbnail_url:
      custom_name: thumbnailUrl
    total_pages:
      custom_name: totalPages
    updated_at:
      custom_name: updatedAt
    user_id:
      custom_name: userId
  custom_column_names:
    created_at: createdAt
    file_url: fileUrl
    thumbnail_url: thumbnailUrl
    total_pages: totalPages
    updated_at: updatedAt
    user_id: userId
  custom_root_fields: {}
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: reading_progresses
    using:
      foreign_key_constraint_on:
        column: book_id
        table:
          name: reading_progresses
          schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - author
        - created_at
        - id
        - source
        - status
        - thumbnail_url
        - title
        - total_pages
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      allow_aggregations: true
      query_root_fields:
        - select
        - select_aggregate
        - select_by_pk
      subscription_root_fields:
        - select
        - select_by_pk
    comment: ""
