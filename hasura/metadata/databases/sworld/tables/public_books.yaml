table:
  name: books
  schema: public
configuration:
  column_config:
    created_at:
      custom_name: createdAt
    file_url:
      custom_name: fileUrl
    thumbnail_url:
      custom_name: thumbnailUrl
    updated_at:
      custom_name: updatedAt
    user_id:
      custom_name: userId
  custom_column_names:
    created_at: createdAt
    file_url: fileUrl
    thumbnail_url: thumbnailUrl
    updated_at: updatedAt
    user_id: userId
  custom_root_fields: {}
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
select_permissions:
  - role: user
    permission:
      columns:
        - created_at
        - id
        - source
        - status
        - thumbnail_url
        - title
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      query_root_fields:
        - select
        - select_by_pk
      subscription_root_fields:
        - select
        - select_by_pk
    comment: ""
