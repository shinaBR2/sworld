table:
  name: book_comments
  schema: public
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - book_id
        - content
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - book_id
        - content
        - created_at
        - id
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      query_root_fields:
        - select
      subscription_root_fields: []
    comment: ""
