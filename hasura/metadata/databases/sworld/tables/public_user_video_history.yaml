table:
  name: user_video_history
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
  - name: video
    using:
      foreign_key_constraint_on: video_id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - last_watched_at
        - progress_seconds
        - video_id
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - last_watched_at
        - progress_seconds
        - video_id
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
