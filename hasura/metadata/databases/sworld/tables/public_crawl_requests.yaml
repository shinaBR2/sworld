table:
  name: crawl_requests
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: vip
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - get_single_video
        - site
        - slug_prefix
        - title
        - url
    comment: ""
event_triggers:
  - name: crawl_request_on_created
    definition:
      enable_manual: true
      insert:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 0
      timeout_sec: 300
    webhook: '{{MAIN_WEBHOOK_DOMAIN}}/videos/crawl'
    headers:
      - name: x-webhook-signature
        value_from_env: MAIN_WEBHOOK_SIGNATURE
      - name: Content-Type
        value: application/json
    request_transform:
      body:
        action: transform
        template: |-
          {
            "event": {
              "data": {{$body.event.data.new}},
              "metadata": {
                "id": {{$body.id}},
                "trace_id": {{$body.event.trace_context.trace_id}},
                "span_id": {{$body.event.trace_context.span_id}}
              }
            },
            "created_at": {{$body.created_at}}
          }
      template_engine: Kriti
      version: 2
