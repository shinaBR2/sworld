table:
  name: crawl_requests
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: vip
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - get_single_video
        - site
        - slug_prefix
        - title
        - url
    comment: ""
