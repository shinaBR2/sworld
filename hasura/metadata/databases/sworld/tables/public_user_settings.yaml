table:
  name: user_settings
  schema: public
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - data
    comment: Owner can create only their own settings row (user_id is preset from the JWT). Enables upsert of the settings blob.
select_permissions:
  - role: user
    permission:
      columns:
        - user_id
        - data
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      query_root_fields:
        - select
        - select_by_pk
      subscription_root_fields: []
    comment: Owner-only. Settings are private to the user; unlike public_users this table is never exposed to the sharing graph.
update_permissions:
  - role: user
    permission:
      columns:
        - data
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check: null
    comment: Owner can update only their own settings blob; no other column is writable.
