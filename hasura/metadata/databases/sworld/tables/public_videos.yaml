table:
  name: videos
  schema: public
configuration:
  column_config:
    created_at:
      custom_name: createdAt
    thumbnail_url:
      custom_name: thumbnailUrl
  custom_column_names:
    created_at: createdAt
    thumbnail_url: thumbnailUrl
  custom_root_fields: {}
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: video_tags
    using:
      foreign_key_constraint_on:
        column: video_id
        table:
          name: video_tags
          schema: public
  - name: video_views
    using:
      foreign_key_constraint_on:
        column: video_id
        table:
          name: video_views
          schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - created_at
        - description
        - id
        - slug
        - source
        - thumbnail_url
        - title
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
event_triggers:
  - name: video_on_created
    definition:
      enable_manual: true
      insert:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 3
      timeout_sec: 300
    webhook: '{{MAIN_WEBHOOK_DOMAIN}}/videos/convert'
    headers:
      - name: x-webhook-signature
        value_from_env: MAIN_WEBHOOK_SIGNATURE
      - name: Content-Type
        value: application/json
    request_transform:
      body:
        action: transform
        template: |-
          {
            "event": {
              "data": {{$body.event.data.new}},
              "metadata": {
                "id": {{$body.id}},
                "trace_id": {{$body.event.trace_context.trace_id}},
                "span_id": {{$body.event.trace_context.span_id}}
              }
            },
            "created_at": {{$body.created_at}}
          }
      template_engine: Kriti
      version: 2
    cleanup_config:
      batch_size: 10000
      clean_invocation_logs: false
      clear_older_than: 168
      paused: false
      schedule: 0 0 * * *
      timeout: 600
