table:
  name: videos
  schema: public
configuration:
  column_config:
    created_at:
      custom_name: createdAt
  custom_column_names:
    created_at: createdAt
  custom_root_fields: {}
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: video_tags
    using:
      foreign_key_constraint_on:
        column: video_id
        table:
          name: video_tags
          schema: public
  - name: video_views
    using:
      foreign_key_constraint_on:
        column: video_id
        table:
          name: video_views
          schema: public
select_permissions:
  - role: user
    permission:
      columns:
        - created_at
        - description
        - id
        - slug
        - source
        - title
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
