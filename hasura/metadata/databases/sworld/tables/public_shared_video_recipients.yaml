table:
  name: shared_video_recipients
  schema: public
configuration:
  column_config:
    created_at:
      custom_name: createdAt
    playlist_id:
      custom_name: playlistId
    receiver_id:
      custom_name: receiverId
    updated_at:
      custom_name: updatedAt
    video_id:
      custom_name: videoId
  custom_column_names:
    created_at: createdAt
    playlist_id: playlistId
    receiver_id: receiverId
    updated_at: updatedAt
    video_id: videoId
  custom_root_fields: {}
object_relationships:
  - name: playlist
    using:
      foreign_key_constraint_on: playlist_id
  - name: receiver
    using:
      foreign_key_constraint_on: receiver_id
  - name: video
    using:
      foreign_key_constraint_on: video_id
