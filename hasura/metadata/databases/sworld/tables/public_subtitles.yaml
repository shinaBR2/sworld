table:
  name: subtitles
  schema: public
configuration:
  column_config:
    is_default:
      custom_name: isDefault
  custom_column_names:
    is_default: isDefault
  custom_root_fields: {}
object_relationships:
  - name: video
    using:
      foreign_key_constraint_on: video_id
insert_permissions:
  - role: user
    permission:
      check: {}
      columns:
        - is_default
        - lang
        - url
        - video_id
    comment: ""
select_permissions:
  - role: anonymous
    permission:
      columns:
        - is_default
        - id
        - lang
        - url
        - video_id
      filter:
        video:
          public:
            _eq: true
      query_root_fields: []
      subscription_root_fields: []
    comment: ""
  - role: user
    permission:
      columns:
        - is_default
        - id
        - lang
        - url
        - video_id
      filter:
        _or:
          - video:
              public:
                _eq: true
          - video:
              user_id:
                _eq: X-Hasura-User-Id
      query_root_fields: []
      subscription_root_fields: []
    comment: ""
