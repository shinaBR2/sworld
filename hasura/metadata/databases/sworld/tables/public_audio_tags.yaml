table:
  name: audio_tags
  schema: public
object_relationships:
  - name: audio
    using:
      foreign_key_constraint_on: audio_id
  - name: tag
    using:
      foreign_key_constraint_on: tag_id
select_permissions:
  - role: anonymous
    permission:
      columns:
        - audio_id
        - tag_id
      filter: {}
    comment: ""
  - role: user
    permission:
      columns:
        - audio_id
        - tag_id
      filter: {}
    comment: ""
