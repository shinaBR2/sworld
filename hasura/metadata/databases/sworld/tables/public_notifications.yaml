table:
  name: notifications
  schema: public
configuration:
  column_config:
    created_at:
      custom_name: createdAt
    entity_id:
      custom_name: entityId
    entity_type:
      custom_name: entityType
    read_at:
      custom_name: readAt
    updated_at:
      custom_name: updatedAt
  custom_column_names:
    created_at: createdAt
    entity_id: entityId
    entity_type: entityType
    read_at: readAt
    updated_at: updatedAt
  custom_root_fields: {}
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
select_permissions:
  - role: user
    permission:
      columns:
        - created_at
        - entity_id
        - entity_type
        - id
        - link
        - message
        - metadata
        - read_at
        - title
        - type
        - user_id
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      query_root_fields: []
      subscription_root_fields:
        - select
    comment: ""
