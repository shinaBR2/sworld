table:
  name: playlist
  schema: public
configuration:
  column_config:
    created_at:
      custom_name: createdAt
    updated_at:
      custom_name: updatedAt
  custom_column_names:
    created_at: createdAt
    updated_at: updatedAt
  custom_root_fields: {}
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: playlist_videos
    using:
      foreign_key_constraint_on:
        column: playlist_id
        table:
          name: playlist_videos
          schema: public
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - description
        - public
        - slug
        - thumbnail_url
        - title
    comment: ""
select_permissions:
  - role: anonymous
    permission:
      columns:
        - created_at
        - description
        - id
        - public
        - slug
        - thumbnail_url
        - title
      filter:
        public:
          _eq: true
    comment: ""
  - role: user
    permission:
      columns:
        - created_at
        - description
        - id
        - public
        - slug
        - thumbnail_url
        - title
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
