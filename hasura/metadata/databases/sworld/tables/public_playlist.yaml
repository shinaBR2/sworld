table:
  name: playlist
  schema: public
configuration:
  column_config:
    created_at:
      custom_name: createdAt
    s_id:
      custom_name: sId
    thumbnail_url:
      custom_name: thumbnailUrl
    updated_at:
      custom_name: updatedAt
  custom_column_names:
    created_at: createdAt
    s_id: sId
    thumbnail_url: thumbnailUrl
    updated_at: updatedAt
  custom_root_fields: {}
object_relationships:
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: playlist_videos
    using:
      foreign_key_constraint_on:
        column: playlist_id
        table:
          name: playlist_videos
          schema: public
  - name: shared_video_recipients
    using:
      foreign_key_constraint_on:
        column: playlist_id
        table:
          name: shared_video_recipients
          schema: public
insert_permissions:
  - role: user
    permission:
      check:
        user_id:
          _eq: X-Hasura-User-Id
      set:
        user_id: x-hasura-User-Id
      columns:
        - description
        - public
        - shared_recipients
        - slug
        - thumbnail_url
        - title
    comment: ""
select_permissions:
  - role: anonymous
    permission:
      columns:
        - created_at
        - description
        - id
        - public
        - s_id
        - slug
        - thumbnail_url
        - title
      filter:
        public:
          _eq: true
    comment: ""
  - role: user
    permission:
      columns:
        - description
        - id
        - public
        - s_id
        - shared_recipients
        - slug
        - thumbnail_url
        - title
        - user_id
      filter:
        _or:
          - user_id:
              _eq: X-Hasura-User-Id
          - shared_video_recipients:
              receiver_id:
                _eq: X-Hasura-User-Id
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - description
        - public
        - shared_recipients
        - title
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check: null
      set:
        user_id: x-hasura-
    comment: ""
